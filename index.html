<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile Realistic Zombie Survival</title>
  
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  
  <style>
    /* Mobile ke on-screen buttons ka design */
    body { margin: 0; overflow: hidden; touch-action: none; }
    #ui-container {
      position: absolute;
      bottom: 30px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      z-index: 999;
      pointer-events: none; /* Taki screen swipe block na ho */
    }
    .btn {
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 12px;
      text-align: center;
      line-height: 70px;
      pointer-events: auto;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: rgba(255, 0, 0, 0.4); border-color: red; }
    #shootBtn { background: rgba(255, 0, 0, 0.2); }
  </style>

  <script>
    let isMoving = false;

    // 1. Mobile Movement Logic (Aage badhne ke liye)
    AFRAME.registerComponent('mobile-movement', {
      tick: function () {
        if (isMoving) {
          let camera = document.querySelector('#camera').object3D;
          let direction = new THREE.Vector3();
          camera.getWorldDirection(direction);
          direction.y = 0; // Hawa mein na ude
          direction.normalize();
          
          let el = this.el;
          let pos = el.getAttribute('position');
          let speed = 0.05; // Chalne ki speed
          
          el.setAttribute('position', {
            x: pos.x + direction.x * speed,
            y: pos.y,
            z: pos.z + direction.z * speed
          });
        }
      }
    });

    // 2. Zombie AI - Player ko follow karega
    AFRAME.registerComponent('zombie-behavior', {
      tick: function () {
        let player = document.querySelector('#player').getAttribute('position');
        let zombie = this.el.getAttribute('position');
        
        let dx = player.x - zombie.x;
        let dz = player.z - zombie.z;
        let distance = Math.sqrt(dx*dx + dz*dz);
        
        if (distance > 1.2) {
          let speed = 0.035;
          this.el.setAttribute('position', {
            x: zombie.x + (dx/distance) * speed,
            y: zombie.y,
            z: zombie.z + (dz/distance) * speed
          });
          this.el.setAttribute('rotation', {x: 0, y: Math.atan2(dx, dz) * 180 / Math.PI, z: 0});
        }
      }
    });

    // 3. Spawning Realistic Textured Zombies
    window.onload = () => {
      let scene = document.querySelector('a-scene');
      for(let i = 0; i < 30; i++) {
        let zombie = document.createElement('a-cylinder');
        let x = (Math.random() - 0.5) * 50;
        let z = (Math.random() - 0.5) * 50;
        
        if (Math.abs(x) < 8 && Math.abs(z) < 8) { x += 15; z += 15; }
        
        zombie.setAttribute('position', `${x} 1 ${z}`);
        zombie.setAttribute('radius', '0.6');
        zombie.setAttribute('height', '2.2');
        zombie.setAttribute('material', 'src: https://images.unsplash.com/photo-1618331835717-801e976710b2?q=80&w=500&auto=format&fit=crop; repeat: 2 2; roughness: 0.8');
        zombie.setAttribute('shadow', 'cast: true; receive: true');
        zombie.setAttribute('class', 'zombie clickable'); // Class zaroori hai pehchanne ke liye
        zombie.setAttribute('zombie-behavior', '');
        
        scene.appendChild(zombie);
      }

      // 4. Mobile Button Controls Binding
      let moveBtn = document.getElementById('moveBtn');
      let shootBtn = document.getElementById('shootBtn');

      // Move Button (Hold to walk)
      moveBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isMoving = true; });
      moveBtn.addEventListener('touchend', (e) => { e.preventDefault(); isMoving = false; });
      moveBtn.addEventListener('mousedown', (e) => { isMoving = true; }); // For PC testing
      moveBtn.addEventListener('mouseup', (e) => { isMoving = false; });

      // Shoot Button (Tap to fire)
      shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); fireGun(); });
      shootBtn.addEventListener('mousedown', (e) => { fireGun(); });

      function fireGun() {
        // Crosshair jis zombie par hai, use check karo
        let cursor = document.querySelector('#cursor').components.raycaster;
        let hitEls = cursor.intersectedEls;
        
        if (hitEls.length > 0) {
          let target = hitEls[0];
          if (target.classList.contains('zombie')) {
            target.setAttribute('material', 'color: #610505; src: ; roughness: 0.9'); // Blood effect
            setTimeout(() => target.remove(), 200); // Zombie mar gaya
          }
        }
      }
    };
  </script>
</head>
<body>

  <div id="ui-container">
    <div class="btn" id="moveBtn">MOVE</div>
    <div class="btn" id="shootBtn">FIRE</div>
  </div>

  <a-scene fog="type: exponential; color: #05080a; density: 0.1" shadow="type: pcfsoft" vr-mode-ui="enabled: false">
    
    <a-entity environment="preset: forest; groundColor: #0a0d0a; groundTexture: walkernoise; skyType: atmosphere; lighting: none"></a-entity>
    <a-light type="ambient" color="#111820" intensity="0.4"></a-light>
    
    <a-entity id="player" position="0 1.6 0" mobile-movement>
      
      <a-entity id="camera" camera look-controls="pointerLockEnabled: false">
        
        <a-light type="spot" color="#e6f2ff" intensity="2" distance="25" angle="40" penumbra="0.5" castShadow="true"></a-light>
        
        <a-entity id="cursor" raycaster="objects: .clickable" position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                  material="color: rgba(255, 0, 0, 0.8); shader: flat"></a-entity>

        <a-entity position="0.25 -0.3 -0.5" rotation="0 0 0">
          <a-cylinder radius="0.015" height="0.4" rotation="90 0 0" color="#111" material="metalness: 0.9"></a-cylinder>
          <a-box position="0 0 0.1" width="0.05" height="0.07" depth="0.3" color="#222" material="metalness: 0.7"></a-box>
        </a-entity>
        
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
