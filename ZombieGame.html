<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Realistic Zombie Survival - Single File</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  
  <script>
    // 1. Zombie AI - Chasing the player
    AFRAME.registerComponent('zombie-behavior', {
      tick: function () {
        let player = document.querySelector('#camera').getAttribute('position');
        let zombie = this.el.getAttribute('position');
        
        let dx = player.x - zombie.x;
        let dz = player.z - zombie.z;
        let distance = Math.sqrt(dx*dx + dz*dz);
        
        // Agar player paas hai toh uski taraf bhago
        if (distance > 1.2) {
          let speed = 0.035;
          this.el.setAttribute('position', {
            x: zombie.x + (dx/distance) * speed,
            y: zombie.y,
            z: zombie.z + (dz/distance) * speed
          });
          // Zombie player ki taraf face karega
          this.el.setAttribute('rotation', {x: 0, y: Math.atan2(dx, dz) * 180 / Math.PI, z: 0});
        }
      }
    });

    // 2. Shooting Logic
    AFRAME.registerComponent('shootable', {
      init: function () {
        this.el.addEventListener('click', () => {
          // Goli lagne par khoon (blood) ka effect
          this.el.setAttribute('material', 'color: #610505; src: ; roughness: 0.9');
          setTimeout(() => { this.el.remove(); }, 200);
        });
      }
    });

    // 3. Spawning Realistic Textured Zombies
    window.onload = () => {
      let scene = document.querySelector('a-scene');
      for(let i = 0; i < 40; i++) {
        let zombie = document.createElement('a-cylinder');
        let x = (Math.random() - 0.5) * 60;
        let z = (Math.random() - 0.5) * 60;
        
        // Player se thoda door spawn ho
        if (Math.abs(x) < 8 && Math.abs(z) < 8) { x += 15; z += 15; }
        
        zombie.setAttribute('position', `${x} 1 ${z}`);
        zombie.setAttribute('radius', '0.6');
        zombie.setAttribute('height', '2.2');
        
        // Internet se live creepy texture fetch kar raha hai realism ke liye
        zombie.setAttribute('material', 'src: https://images.unsplash.com/photo-1618331835717-801e976710b2?q=80&w=500&auto=format&fit=crop; repeat: 2 2; roughness: 0.8');
        zombie.setAttribute('shadow', 'cast: true; receive: true');
        zombie.setAttribute('class', 'clickable');
        zombie.setAttribute('shootable', '');
        zombie.setAttribute('zombie-behavior', '');
        
        scene.appendChild(zombie);
      }
    };
  </script>
</head>
<body>
  <a-scene fog="type: exponential; color: #05080a; density: 0.1" shadow="type: pcfsoft">
    
    <a-entity environment="preset: forest; groundColor: #0a0d0a; groundTexture: walkernoise; skyType: atmosphere; lighting: none"></a-entity>

    <a-light type="ambient" color="#111820" intensity="0.4"></a-light>
    
    <a-entity id="player" position="0 1.6 0">
      <a-entity id="camera" camera look-controls wasd-controls="acceleration: 200">
        
        <a-light type="spot" color="#e6f2ff" intensity="2" distance="25" angle="40" penumbra="0.5" position="0 0 0" castShadow="true"></a-light>
        
        <a-entity cursor="fuse: false" raycaster="objects: .clickable" position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.005; radiusOuter: 0.01"
                  material="color: rgba(255, 0, 0, 0.7); shader: flat"></a-entity>

        <a-entity position="0.3 -0.3 -0.6">
          <a-cylinder radius="0.015" height="0.4" rotation="90 0 0" color="#111" material="metalness: 0.9; roughness: 0.2" shadow="cast: true"></a-cylinder>
          <a-box position="0 0 0.1" width="0.05" height="0.07" depth="0.3" color="#222" material="metalness: 0.7; roughness: 0.3" shadow="cast: true"></a-box>
          <a-box position="0 -0.1 0.2" width="0.04" height="0.12" depth="0.06" rotation="-20 0 0" color="#0a0a0a" material="roughness: 0.9"></a-box>
        </a-entity>
        
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
